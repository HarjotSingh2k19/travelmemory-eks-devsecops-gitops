apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: travelmemory-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/HarjotSingh2k19/travelmemory-eks-devsecops-gitops.git'
    targetRevision: HEAD
    # Update this path to new location of your Chart.yaml
    path: devops/helm/travelmemory
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true